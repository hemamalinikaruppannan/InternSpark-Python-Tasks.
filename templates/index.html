<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask To-Do App</title>
    <!-- Bootstrap 5 CSS Link for Design -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .completed { text-decoration: line-through; color: #6c757d; }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title text-center mb-4 text-primary">My To-Do List</h2>
                
                <!-- Add Task Form -->
                <form action="/add" method="POST" class="d-flex mb-4">
                    <input type="text" name="task" class="form-control me-2" placeholder="Enter a new task..." required>
                    <button type="submit" class="btn btn-primary">Add</button>
                </form>

                <!-- Tasks List -->
                <ul class="list-group">
                    {% for todo in todos %}
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <span class="{% if todo.done %}completed{% endif %}">
                            {{ todo.task }}
                        </span>
                        <div>
                            <a href="/toggle/{{ todo.id }}" class="btn btn-sm {% if todo.done %}btn-secondary{% else %}btn-success{% endif %}">
                                {% if todo.done %}Undo{% else %}Done{% endif %}
                            </a>
                            <a href="/delete/{{ todo.id }}" class="btn btn-sm btn-danger ms-1">Delete</a>
                        </div>
                    </li>
                    {% else %}
                    <li class="list-group-item text-center text-muted">No tasks yet. Add one above!</li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
